name: Publish complete candidate campaign

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.publish-trigger'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Expand complete campaign package
        shell: bash
        run: |
          set -euo pipefail
          cat release/part-* | base64 --decode > /tmp/clickup-release.tar.gz
          mkdir -p /tmp/clickup-release
          tar -xzf /tmp/clickup-release.tar.gz -C /tmp/clickup-release
          index_path="$(find /tmp/clickup-release -type f -name index.html -print -quit)"
          test -n "$index_path"
          release_root="$(dirname "$index_path")"
          cp -a "$release_root"/. ./
          touch .nojekyll
      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No publication changes found."
            exit 0
          fi
          git commit -m "Publish complete ClickUp campaign documents"
          git push origin HEAD:main
