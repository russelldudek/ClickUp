name: Publish complete candidate campaign

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.publish-trigger'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract and verify complete campaign
        shell: bash
        run: |
          set -euo pipefail
          cat release/part-* | base64 --decode > /tmp/clickup-release.tar.gz
          rm -rf /tmp/clickup-release
          mkdir -p /tmp/clickup-release
          tar -xzf /tmp/clickup-release.tar.gz -C /tmp/clickup-release || true
          for path in \
            index.html \
            resume.html \
            cover-letter.html \
            90-day-plan.html \
            interview-brief.html \
            executive-commit.html \
            styles.css \
            app.js \
            docs/Russell-Dudek-ClickUp-Chief-of-Staff-Resume.pdf \
            docs/Russell-Dudek-ClickUp-Chief-of-Staff-Cover-Letter.pdf \
            docs/Russell-Dudek-ClickUp-90-Day-Entry-Plan.pdf \
            docs/Russell-Dudek-ClickUp-Interview-Thesis-Brief.pdf \
            docs/Russell-Dudek-ClickUp-Executive-Commit-Review.pdf; do
            test -s "/tmp/clickup-release/$path"
          done
          cp -a /tmp/clickup-release/. ./
          touch .nojekyll
          rm -f publication-diagnostic.txt
      - name: Verify committed-route contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'docs/Russell-Dudek-ClickUp-Chief-of-Staff-Resume.pdf' resume.html
          grep -q 'docs/Russell-Dudek-ClickUp-Chief-of-Staff-Cover-Letter.pdf' cover-letter.html
          grep -q 'docs/Russell-Dudek-ClickUp-90-Day-Entry-Plan.pdf' 90-day-plan.html
      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete ClickUp campaign documents"
          git push origin HEAD:main
