name: Diagnose and publish complete candidate campaign

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.publish-trigger'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Diagnose staged release
        shell: bash
        run: |
          set +e
          : > publication-diagnostic.txt
          echo "main=$(git rev-parse HEAD)" >> publication-diagnostic.txt
          ls -l release >> publication-diagnostic.txt 2>&1
          cat release/part-* | base64 --decode > /tmp/clickup-release.tar.gz 2>> publication-diagnostic.txt
          echo "decode_exit=$?" >> publication-diagnostic.txt
          ls -l /tmp/clickup-release.tar.gz >> publication-diagnostic.txt 2>&1
          tar -tzf /tmp/clickup-release.tar.gz | head -80 >> publication-diagnostic.txt 2>&1
          echo "list_exit=${PIPESTATUS[0]}" >> publication-diagnostic.txt
          rm -rf /tmp/clickup-release
          mkdir -p /tmp/clickup-release
          tar -xzf /tmp/clickup-release.tar.gz -C /tmp/clickup-release >> publication-diagnostic.txt 2>&1
          echo "extract_exit=$?" >> publication-diagnostic.txt
          find /tmp/clickup-release -maxdepth 4 -type f -printf '%P\n' | sort | head -120 >> publication-diagnostic.txt
      - name: Commit diagnostic receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publication-diagnostic.txt
          git commit -m "Record ClickUp publication diagnostic" || true
          git push origin HEAD:main
