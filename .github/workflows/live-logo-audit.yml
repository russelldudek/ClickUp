name: Verify live official ClickUp logo

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.logo-live-trigger'

permissions:
  contents: write

jobs:
  live-logo-audit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out corrected main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for exact corrected Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          site="https://russelldudek.github.io/ClickUp/index.html?v=$sha"
          logo="https://russelldudek.github.io/ClickUp/assets/brand/clickup-logo.svg?v=$sha"
          success=0
          for attempt in $(seq 1 36); do
            if curl -fsSL --retry 2 "$site" -o /tmp/live-index.html \
              && curl -fsSL --retry 2 "$logo" -o /tmp/live-logo.svg \
              && grep -q 'assets/brand/clickup-logo.svg' /tmp/live-index.html \
              && ! grep -q 'class="company-name"' /tmp/live-index.html \
              && cmp -s assets/brand/clickup-logo.svg /tmp/live-logo.svg; then
                success=1
                break
            fi
            sleep 10
          done
          test "$success" -eq 1
          local_sha="$(sha256sum assets/brand/clickup-logo.svg | awk '{print $1}')"
          live_sha="$(sha256sum /tmp/live-logo.svg | awk '{print $1}')"
          cat > live-logo-audit.txt <<EOF
          Audited main head: $sha
          Live site: https://russelldudek.github.io/ClickUp/
          Official logo route: https://russelldudek.github.io/ClickUp/assets/brand/clickup-logo.svg
          Local asset SHA-256: $local_sha
          Live asset SHA-256: $live_sha
          Homepage references local official logo: passed
          Custom pseudo-wordmark absent: passed
          Live asset byte equality: passed
          EOF

      - name: Record corrected live proof
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          audit = Path('campaign-audit.md')
          text = audit.read_text()
          text = text.replace('- Prior brand-fidelity proof: invalidated until corrected source and live asset delivery are reverified.', '- Corrected source and live asset delivery: reverified; the public SVG is byte-identical to the official asset committed on `main`.', 1)
          text += '\n## Official-logo live verification\n' + Path('live-logo-audit.txt').read_text() + '\n'
          audit.write_text(text)
          PY
          rm -f .github/workflows/live-logo-audit.yml .logo-live-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Verify official ClickUp logo on live site"
          git push origin HEAD:main
