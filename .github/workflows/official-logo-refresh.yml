name: Install official ClickUp logo

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.brand-logo-trigger'

permissions:
  contents: write

jobs:
  brand-correction:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download official current ClickUp lockup
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          curl --location --fail --retry 4 --retry-all-errors \
            https://clickup.com/assets/brand/v4/Logo-gradient-on-light.svg \
            --output assets/brand/clickup-logo.svg
          test "$(wc -c < assets/brand/clickup-logo.svg)" -gt 500
          grep -q '<svg' assets/brand/clickup-logo.svg
          ! grep -qi '<script' assets/brand/clickup-logo.svg

      - name: Replace pseudo-wordmark with official asset
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text()
          old = '<div class="company-lockup"><div class="company-name" aria-label="ClickUp"><span>Click</span><span class="up">Up™</span></div><div class="lockup-copy">'
          new = '<div class="company-lockup"><div class="company-logo-wrap"><img class="company-logo" src="assets/brand/clickup-logo.svg" alt="ClickUp" decoding="async"></div><div class="lockup-copy">'
          if old not in html:
              raise SystemExit('Expected custom ClickUp wordmark markup was not found.')
          index.write_text(html.replace(old, new, 1))

          styles = Path('styles.css')
          css = styles.read_text()
          old_css = '.company-lockup{display:flex;align-items:center;gap:16px;margin-bottom:38px}.company-name{font-family:"Plus Jakarta Sans",Inter,sans-serif;font-size:1.55rem;font-weight:850;letter-spacing:-.06em;padding-right:17px;border-right:1px solid var(--line)}.company-name .up{background:var(--gradient-brand);-webkit-background-clip:text;background-clip:text;color:transparent}.lockup-copy{font-size:.72rem;line-height:1.42;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);font-weight:760}'
          new_css = '.company-lockup{display:flex;align-items:center;gap:18px;margin-bottom:38px}.company-logo-wrap{display:flex;align-items:center;padding-right:20px;border-right:1px solid var(--line)}.company-logo{display:block;width:164px;height:auto;max-width:none}.lockup-copy{font-size:.72rem;line-height:1.42;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);font-weight:760}'
          if old_css not in css:
              raise SystemExit('Expected custom wordmark CSS was not found.')
          css = css.replace(old_css, new_css, 1)
          css += '\n@media(max-width:420px){.company-lockup{gap:13px}.company-logo-wrap{padding-right:13px}.company-logo{width:138px}.lockup-copy{font-size:.64rem;letter-spacing:.09em}}\n'
          styles.write_text(css)

          brand = Path('brand-intelligence.md')
          text = brand.read_text()
          old_identity = "The official brand page exposes current logo asset URLs, including `Logo-gradient-on-light.svg` and `Logomark-gradient.svg`. The campaign build environment could identify but could not retrieve the vector bytes from ClickUp's asset host. Because the brand rules prohibit tracing or recreating the mark, the campaign uses a clearly typeset `ClickUp™` name as nominative identification rather than a pseudo-logo. It appears with an immediate independent-candidate qualifier and the required non-endorsement/trademark statements. No official mark is hotlinked, redrawn, recolored, cropped, or animated."
          new_identity = "The hero uses ClickUp's current official full-lockup SVG from `https://clickup.com/assets/brand/v4/Logo-gradient-on-light.svg`, downloaded without modification and committed locally as `assets/brand/clickup-logo.svg`. It appears with an immediate independent-candidate qualifier and the required non-endorsement/trademark statements. The mark is not traced, redrawn, recolored, cropped, stretched, animated, or combined into a candidate-created logo."
          if old_identity not in text:
              raise SystemExit('Expected prior logo exception was not found in brand-intelligence.md.')
          text = text.replace(old_identity, new_identity, 1)
          text = text.replace('- Website: fullest brand expression, typeset company reference, official color accents, independent candidate qualifier.', '- Website: official current full-lockup SVG above the fold, official color accents, and an immediate independent-candidate qualifier.', 1)
          brand.write_text(text)

          Path('assets/brand/README.md').write_text('''# ClickUp Brand Asset\n\n## Official full lockup\n- Local file: `clickup-logo.svg`\n- Official source: https://clickup.com/assets/brand/v4/Logo-gradient-on-light.svg\n- Brand guide: https://clickup.com/brand\n- Retrieved by the campaign publication workflow without modification.\n- Visible use: candidate-vision hero on a light background with preserved proportions and clear space.\n- The adjacent copy identifies this as an independent candidate vision by Russell Dudek.\n''')

          audit = Path('campaign-audit.md')
          audit_text = audit.read_text()
          audit_text = audit_text.replace('- Visible company identity: passed using a documented typeset fallback because the current official asset endpoint could not be retrieved reliably for local commitment.', '- Visible company identity: corrected to the official current ClickUp full-lockup SVG, locally committed and used above the fold with an immediate independent-candidate qualifier.', 1)
          audit_text += '\n## Official-logo correction regression\n- Observed defect: the hero used a code-recreated ClickUp wordmark that looked invented.\n- Approved correction: official unmodified full-lockup SVG from ClickUp’s current brand page.\n- Regression assertion: `index.html` must reference `assets/brand/clickup-logo.svg`; custom `.company-name` pseudo-wordmark markup and styling must be absent; the local SVG must parse and retain a viewBox.\n- Affected surface: candidate-vision homepage hero.\n- Prior brand-fidelity proof: invalidated until corrected source and live asset delivery are reverified.\n'
          audit.write_text(audit_text)
          PY

      - name: Verify brand correction
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'assets/brand/clickup-logo.svg' index.html
          ! grep -q 'class="company-name"' index.html
          ! grep -q '\.company-name' styles.css
          grep -q 'company-logo-wrap' styles.css
          grep -q 'Independent candidate vision' index.html
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          root = ET.parse('assets/brand/clickup-logo.svg').getroot()
          if not root.tag.endswith('svg'):
              raise SystemExit('Official asset is not an SVG root.')
          if not root.attrib.get('viewBox'):
              raise SystemExit('Official SVG is missing a viewBox.')
          print(root.attrib.get('viewBox'))
          PY
          sha256sum assets/brand/clickup-logo.svg

      - name: Commit corrected brand package to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/official-logo-refresh.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use official ClickUp logo in candidate hero"
          git push origin HEAD:main
