<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Loading Russell Dudek's ClickUp candidate campaign</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,sans-serif;background:#f8f7fb;color:#17151f}.load{max-width:620px;padding:32px;text-align:center}.bar{height:5px;border-radius:99px;background:linear-gradient(90deg,#ff02f0,#fc6d2d,#6647f0,#0091ff);animation:p 1.4s ease-in-out infinite alternate}@keyframes p{from{transform:scaleX(.25)}to{transform:scaleX(1)}}@media(prefers-reduced-motion:reduce){.bar{animation:none}}</style></head><body><div class="load"><h1>Assembling the Executive Commit</h1><p id="status">Loading the verified campaign package…</p><div class="bar"></div></div><script>
(async()=>{
 const status=document.getElementById('status');
 try{
  const parts=await Promise.all(['00','01','02','03','04'].map(n=>fetch(`.bootstrap/part-${n}`).then(r=>{if(!r.ok)throw new Error(`release part ${n}`);return r.text()})));
  const b64=parts.join('').replace(/\s/g,'');
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const stream=new Blob([raw]).stream().pipeThrough(new DecompressionStream('gzip'));
  const tar=new Uint8Array(await new Response(stream).arrayBuffer());
  const files=new Map(); const td=new TextDecoder();
  let o=0;
  while(o+512<=tar.length){
   const header=tar.slice(o,o+512); if(header.every(v=>v===0))break;
   const name=td.decode(header.slice(0,100)).replace(/\0.*$/,'');
   const prefix=td.decode(header.slice(345,500)).replace(/\0.*$/,'');
   const full=(prefix?`${prefix}/${name}`:name).replace(/^\.\//,'');
   const sizeText=td.decode(header.slice(124,136)).replace(/\0.*$/,'').trim();
   const size=parseInt(sizeText||'0',8); o+=512;
   if(full && !full.endsWith('/'))files.set(full,tar.slice(o,o+size));
   o+=Math.ceil(size/512)*512;
  }
  const text=n=>td.decode(files.get(n)||new Uint8Array());
  const urls=new Map();
  const blobUrl=(n,type)=>{if(!urls.has(n))urls.set(n,URL.createObjectURL(new Blob([files.get(n)],{type})));return urls.get(n)};
  let css=text('styles.css').replace(/@import\s+url\(["']brand-tokens\.css["']\);?/,'')+'\n'+text('brand-tokens.css');
  const cssUrl=URL.createObjectURL(new Blob([css],{type:'text/css'}));
  const jsUrl=blobUrl('app.js','text/javascript');
  const requested=new URLSearchParams(location.search).get('page')||'index.html';
  const target=files.has(requested)?requested:'index.html';
  let html=text(target);
  html=html.replace(/href=["']styles\.css["']/g,`href="${cssUrl}"`)
   .replace(/src=["']app\.js["']/g,`src="${jsUrl}"`)
   .replace(/href=["']([^"']+\.html)(#[^"']*)?["']/g,(m,p,h='')=>`href="index.html?page=${encodeURIComponent(p)}${h}"`)
   .replace(/href=["'](docs\/[^"']+\.pdf)["']/g,(m,p)=>`href="${blobUrl(p,'application/pdf')}"`);
  document.open();document.write(html);document.close();
 }catch(err){status.textContent=`The campaign package could not be assembled (${err.message}).`;console.error(err)}
})();
</script></body></html>
